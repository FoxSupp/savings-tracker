services:
  app:
    build: .
    container_name: savings-tracker
    restart: unless-stopped
    ports:
      - "5010:5000"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s